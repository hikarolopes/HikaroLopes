<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscador de CEP - CEP 82120-520</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }

        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 10px;
            font-size: 2em;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 1em;
        }

        .exemplo-box {
            background: #f0f4ff;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
            border: 2px dashed #667eea;
            text-align: center;
        }

        .exemplo-box p {
            color: #333;
            font-size: 1.1em;
        }

        .exemplo-box strong {
            color: #667eea;
            font-size: 1.3em;
            background: white;
            padding: 5px 15px;
            border-radius: 20px;
            margin-left: 10px;
        }

        .busca {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }

        #cep {
            flex: 1;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1.1em;
            transition: border-color 0.3s ease;
            outline: none;
        }

        #cep:focus {
            border-color: #667eea;
        }

        button {
            padding: 15px 30px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1.1em;
            font-weight: 600;
            transition: background 0.3s ease;
        }

        button:hover {
            background: #764ba2;
        }

        .resultado-card {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 25px;
            border-left: 5px solid #667eea;
            margin-top: 20px;
        }

        .campo {
            margin-bottom: 15px;
            padding: 12px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            display: flex;
            align-items: center;
        }

        .campo strong {
            color: #667eea;
            min-width: 120px;
            font-size: 1.1em;
        }

        .campo span {
            color: #333;
            flex: 1;
            font-size: 1.1em;
            font-weight: 500;
        }

        .cep-destaque {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
            display: inline-block;
        }

        .loading {
            text-align: center;
            padding: 20px;
            display: none;
        }

        .loading-spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .erro {
            color: #721c24;
            background-color: #f8d7da;
            border: 1px solid #f5c6cb;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            display: none;
        }

        .info {
            text-align: center;
            margin-top: 20px;
            color: #999;
            font-size: 0.9em;
        }

        .footer {
            text-align: center;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📮 Buscador de CEP</h1>
        <p class="subtitle">Consulte endereços brasileiros através do CEP</p>
        
        <div class="exemplo-box">
            <p>🔍 CEP de exemplo: <strong>82120-520</strong></p>
        </div>

        <div class="busca">
            <input type="text" id="cep" placeholder="Digite o CEP (apenas números)" value="82120520">
            <button onclick="buscarEndereco()">Buscar</button>
        </div>

        <div class="loading" id="loading">
            <div class="loading-spinner"></div>
            <p>Buscando endereço...</p>
        </div>

        <div class="erro" id="erro"></div>

        <div class="resultado-card" id="resultado">
            <div class="campo">
                <strong>📮 CEP:</strong>
                <span id="cepResultado" class="cep-destaque"></span>
            </div>
            <div class="campo">
                <strong>🏠 Logradouro:</strong>
                <span id="logradouro"></span>
            </div>
            <div class="campo">
                <strong>📍 Bairro:</strong>
                <span id="bairro"></span>
            </div>
            <div class="campo">
                <strong>🏙️ Cidade:</strong>
                <span id="cidade"></span>
            </div>
            <div class="campo">
                <strong>🗺️ Estado:</strong>
                <span id="estado"></span>
            </div>
        </div>

        <div class="footer">
            <p>Desenvolvido para atividade acadêmica</p>
        </div>
    </div>

    <script>
        // Função para formatar o CEP enquanto digita
        document.getElementById('cep').addEventListener('input', function(e) {
            let cep = e.target.value.replace(/\D/g, '');
            e.target.value = cep;
        });

        // Função principal para buscar o CEP
        async function buscarEndereco() {
            // Pega o valor do input e remove caracteres não numéricos
            let cep = document.getElementById('cep').value.replace(/\D/g, '');
            
            // Valida se o CEP tem 8 dígitos
            if (cep.length !== 8) {
                mostrarErro('CEP inválido! Digite 8 números.');
                return;
            }

            // Mostra o loading e esconde erros anteriores
            document.getElementById('loading').style.display = 'block';
            document.getElementById('erro').style.display = 'none';
            document.getElementById('resultado').style.opacity = '0.5';

            try {
                // Faz a requisição para a API ViaCEP
                const response = await fetch(`https://viacep.com.br/ws/${cep}/json/`);
                const dados = await response.json();

                // Esconde o loading
                document.getElementById('loading').style.display = 'none';
                document.getElementById('resultado').style.opacity = '1';

                // Verifica se o CEP foi encontrado
                if (dados.erro) {
                    mostrarErro('CEP não encontrado!');
                    return;
                }

                // Preenche os campos com os dados recebidos da API
                document.getElementById('cepResultado').textContent = dados.cep;
                document.getElementById('logradouro').textContent = dados.logradouro || 'Não informado';
                document.getElementById('bairro').textContent = dados.bairro || 'Não informado';
                document.getElementById('cidade').textContent = dados.localidade || 'Não informado';
                document.getElementById('estado').textContent = dados.uf || 'Não informado';

                // Log para debug (mostra os dados reais no console)
                console.log('Dados recebidos da API:', dados);

            } catch (error) {
                // Esconde o loading
                document.getElementById('loading').style.display = 'none';
                document.getElementById('resultado').style.opacity = '1';
                
                // Mostra erro de conexão
                mostrarErro('Erro ao buscar CEP. Verifique sua internet.');
                console.error('Erro:', error);
            }
        }

        function mostrarErro(mensagem) {
            const erroDiv = document.getElementById('erro');
            erroDiv.textContent = mensagem;
            erroDiv.style.display = 'block';
        }

        // Busca automaticamente o CEP quando a página carrega
        window.onload = function() {
            // Aguarda um pequeno momento para garantir que tudo carregou
            setTimeout(() => {
                buscarEndereco();
            }, 500);
        };

        // Permite buscar pressionando Enter
        document.getElementById('cep').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                buscarEndereco();
            }
        });
    </script>
</body>
</html>
